user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    server {
        listen 80;

        location /.well-known/acme-challenge/ {
            proxy_pass http://certbot:80;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }
}

stream {
    map $ssl_preread_server_name $backend {
        signal.psheckoserve.work    signal-terminate;
        default                      caddy-backend;
    }

    upstream signal-terminate {
        server nginx-terminate:443;
    }

    upstream caddy-backend {
        server caddy:443;
    }

    server {
        listen      443;
        proxy_pass  $backend;
        ssl_preread on;
        access_log  off;
        error_log   /dev/null;
    }
}
